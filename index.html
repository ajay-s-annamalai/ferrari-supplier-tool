    function matchFilter(v, f) {
      if (f === "high")   return v.comp === "High";
      if (f === "as9100") return v.as9100;
      if (f === "itar")   return v.itar;
      if (f === "multi")  return v.subs.filter(s => s !== "Pending").length >= 3;
      if (f === "fast")   return v.lead.includes("day") || v.lead === "1–2 weeks" || v.lead === "1–3 weeks";
      return true;
    }

    function tolPct(t) {
      if (!t) return 0;
      const mn = Math.log10(0.00004), mx = Math.log10(0.020);
      return Math.max(4, Math.round(100 - ((Math.log10(t) - mn) / (mx - mn)) * 88));
    }

    .fi{display:flex;flex-direction:column;gap:2px;}
    .fk{font-family:'DM Mono',monospace;font-size:7px;color:var(--lt);letter-spacing:1px;text-transform:uppercase;}
    .fv{font-size:11px;color:var(--dk);font-weight:500;}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.38);z-index:999;display:flex;justify-content:flex-end;animation:fi .15s ease;}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    .drawer{width:440px;max-width:95vw;background:var(--white);border-left:4px solid var(--red);height:100vh;overflow-y:auto;animation:si .2s ease;display:flex;flex-direction:column;}
    @keyframes si{from{transform:translateX(36px);opacity:0}to{transform:translateX(0);opacity:1}}
    .d-hdr{background:var(--black);padding:20px 24px;position:sticky;top:0;z-index:10;}
    .d-close{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:rgba(255,255,255,0.45);cursor:pointer;background:none;border:none;float:right;transition:color .15s;padding:2px 0;}
    .d-close:hover{color:var(--white);}
    .d-name{font-size:15px;font-weight:600;color:var(--white);margin-bottom:3px;line-height:1.3;padding-right:50px;}
    .d-loc{font-family:'DM Mono',monospace;font-size:8px;color:rgba(255,255,255,0.45);}
    .d-comp{display:inline-block;margin-top:8px;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:1px;padding:3px 8px;border-radius:2px;}
    .dcH{background:rgba(26,107,60,0.28);color:#5dba8a;}
    .dcM{background:rgba(138,80,0,0.28);color:#d4a040;}
    .dcL{background:rgba(204,0,0,0.28);color:#ee8888;}
    .d-body{padding:22px 24px;flex:1;}
    .d-sec{margin-bottom:22px;}
    .d-stitle{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--lt);padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:12px;}
    .d-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .d-item .dk{font-family:'DM Mono',monospace;font-size:8px;color:var(--lt);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
    .d-item .dv{font-size:12px;color:var(--black);font-weight:500;}
    .cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
    .cert{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:4px;border:1px solid var(--line);}
    .cert.yes{border-color:#b8dfc8;background:#eaf5ef;}
    .cert.amb{border-color:#f5d99a;background:#fef5e7;}
    .ci-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
    .ci-dot.y{background:var(--green);color:var(--white);}
    .ci-dot.n{background:var(--line);color:var(--lt);}
    .ci-dot.a{background:var(--amber);color:var(--white);}
    .ci-name{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;}
    .ci-name.y{color:var(--green);}
    .ci-name.n{color:var(--lt);}
    .ci-name.a{color:var(--amber);}
    .proc-list{display:flex;flex-direction:column;gap:0;}
    .proc{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12px;color:var(--dk);}
    .proc:last-child{border-bottom:none;}
    .proc-dot{width:4px;height:4px;background:var(--red);border-radius:50%;flex-shrink:0;}
    .sub-pills{display:flex;flex-wrap:wrap;gap:6px;}
    .sub-pill{font-family:'DM Mono',monospace;font-size:9px;padding:4px 10px;border-radius:3px;border:1px solid var(--red);color:var(--red);background:var(--rl);}
    .checklist{display:flex;flex-direction:column;gap:9px;}
    .c-row{display:flex;gap:10px;align-items:flex-start;}
    .c-num{width:20px;height:20px;border-radius:50%;background:var(--black);color:var(--white);font-family:'DM Mono',monospace;font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
    .c-txt{font-size:11px;color:var(--mid);line-height:1.5;}
    .d-warn{background:var(--rl);border:1px solid #f5b8b8;border-radius:4px;padding:10px 13px;margin-bottom:18px;font-size:11px;color:var(--red);display:flex;gap:8px;align-items:flex-start;line-height:1.5;}
    .visit-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:3px;cursor:pointer;text-decoration:none;transition:background .15s;margin-top:4px;}
    .visit-btn:hover{background:var(--red);}
    .visit-btn.dis{background:var(--line);color:var(--lt);cursor:default;pointer-events:none;}
    .empty{padding:80px 28px;text-align:center;}
    .e-ico{font-size:28px;opacity:.25;margin-bottom:10px;}
    .e-t{font-size:15px;font-weight:600;margin-bottom:5px;}
    .e-s{font-size:13px;color:var(--mid);}
    `;

    function Card({ v, multi, delay, onClick }) {
      const p = tolPct(v.tn);
      return (
        <div className={"card" + (multi ? " mr" : "")} style={{ animationDelay: delay + "ms" }} onClick={onClick}>
          {multi && <div className="mr-flag">MULTI-ROLE</div>}
          <div className="c-head">
            <div className="c-name">{v.name}</div>
            <div className={"badge b" + v.comp[0]}>{v.comp.toUpperCase()}</div>
          </div>
          <div className="c-loc">📍 {v.city} · {region(v.city)}</div>
          <div className="c-procs">{v.procs.join(" · ")}</div>
          <div className="c-tags">
            {v.iso    && <span className="tag tg">ISO 9001</span>}
            {v.as9100 && <span className="tag tg">AS9100</span>}
            {v.itar   && <span className="tag ta">ITAR</span>}
            {multi    && <span className="tag tm">{v.subs.filter(s => s !== "Pending").length} subsystems</span>}
          </div>
          <div className="tol-h">
            <span className="tol-k">Tolerance</span>
            <span className="tol-v">{v.tol}</span>
          </div>
          <div className="tol-track">
            {v.tn && <div className={"tol-fill" + (p < 50 ? " lt" : "")} style={{ width: p + "%" }} />}
          </div>
          <div className="c-foot">
            <div className="fi"><span className="fk">Lead Time</span><span className="fv">{v.lead}</span></div>
            <div className="fi"><span className="fk">MOQ</span><span className="fv">{v.moq}</span></div>
          </div>
        </div>
      );
    }

    function Drawer({ v, multi, onClose }) {
      const otherSubs = v.subs.filter(s => s !== "Pending");
      const certs = [
        { name: "ISO 9001",   t: v.iso    ? "y" : "n" },
        { name: "IATF 16949", t: "n" },
        { name: "AS9100",     t: v.as9100 ? "y" : "n" },
        { name: "ITAR",       t: v.itar   ? "a" : "n" },
      ];
      return (
        <div className="drawer">
          <div className="d-hdr">
            <button className="d-close" onClick={onClose}>✕ CLOSE</button>
            <div className="d-name">{v.name}</div>
            <div className="d-loc">{v.city} · {region(v.city)}</div>
            <div className={"d-comp dc" + v.comp[0]}>{v.comp} Profile</div>
          </div>
          <div className="d-body">
            <div className="d-warn">
              <span>⚠</span>
              <span>Cert status is claimed, not verified. Request certificate PDFs and confirm with the issuing registrar before placing any PO.</span>
            </div>
            <div className="d-sec">
              <div className="d-stitle">Details</div>
              <div className="d-grid">
                {[["Tolerance", v.tol], ["Lead Time", v.lead], ["Min Order", v.moq], ["Region", region(v.city)]].map(([k, val]) => (
                  <div className="d-item" key={k}><div className="dk">{k}</div><div className="dv">{val}</div></div>
                ))}
              </div>
            </div>
            <div className="d-sec">
              <div className="d-stitle">Certifications</div>
              <div className="cert-grid">
                {certs.map(c => (
                  <div key={c.name} className={"cert" + (c.t === "y" ? " yes" : c.t === "a" ? " amb" : "")}>
                    <div className={"ci-dot " + c.t}>{c.t === "n" ? "–" : "✓"}</div>
                    <div className={"ci-name " + c.t}>{c.name}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="d-sec">
              <div className="d-stitle">Capabilities</div>
              <div className="proc-list">
                {v.procs.map((p, i) => (
                  <div className="proc" key={i}><div className="proc-dot" />{p}</div>
                ))}
              </div>
            </div>
            {multi && (
              <div className="d-sec">
                <div className="d-stitle">Active Subsystems ({otherSubs.length})</div>
                <div className="sub-pills">{otherSubs.map(s => <div key={s} className="sub-pill">{s}</div>)}</div>
              </div>
            )}
            <div className="d-sec">
              <div className="d-stitle">Verification Checklist</div>
              <div className="checklist">
                {["Request current ISO / AS9100 certificate PDF from vendor","Verify cert number via IATF or IQNet public registry","Confirm issuing registrar name and scope statement","Check expiry date and site-specific coverage","Schedule site visit or video call before first PO"].map((s, i) => (
                  <div className="c-row" key={i}><div className="c-num">{i + 1}</div><div className="c-txt">{s}</div></div>
                ))}
              </div>
            </div>
            {v.url
              ? <a href={v.url} target="_blank" rel="noopener noreferrer" className="visit-btn">Visit Website →</a>
              : <div className="visit-btn dis">No website on file</div>}
          </div>
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("ADAS");
      const [filters, setFilters] = useState([]);
      const [search, setSearch] = useState("");
      const [sel, setSel] = useState(null);

      const deduped = useMemo(() => {
        const seen = new Map();
        VENDORS.forEach(v => { if (!seen.has(v.name)) seen.set(v.name, v); });
        return Array.from(seen.values());
      }, []);

      const tabV = useMemo(() => {
        const seen = new Set();
        return VENDORS.filter(v => {
          if (!v.subs.includes(tab) || seen.has(v.name)) return false;
          seen.add(v.name); return true;
        });
      }, [tab]);

      const filtered = useMemo(() => {
        let list = tabV;
        if (filters.length) list = list.filter(v => filters.every(f => matchFilter(v, f)));
        if (search.trim()) {
          const q = search.toLowerCase();
          list = list.filter(v => v.name.toLowerCase().includes(q) || v.city.toLowerCase().includes(q) || v.procs.some(p => p.toLowerCase().includes(q)));
        }
        return list;
      }, [tabV, filters, search]);

      const counts = useMemo(() => {
        const m = {};
        SUBS.forEach(s => {
          const seen = new Set();
          m[s] = VENDORS.filter(v => { if (!v.subs.includes(s) || seen.has(v.name)) return false; seen.add(v.name); return true; }).length;
        });
        return m;
      }, []);

      const multiCount = deduped.filter(v => v.subs.filter(s => s !== "Pending").length >= 3).length;
      const highCount  = deduped.filter(v => v.comp === "High").length;
      const isMulti    = v => v.subs.filter(s => s !== "Pending").length >= 3;
      const togFilter  = id => setFilters(f => f.includes(id) ? f.filter(x => x !== id) : [...f, id]);

      return (
        <>
          <style>{CSS}</style>
          <div className="app">
            <div className="hdr">
              <div className="hdr-l">
                <div className="shield" />
                <div>
                  <div className="brand">Ferrari Innovation Lab</div>
                  <div className="brand-sub">Bay Area Supplier Intelligence · Apr 2026</div>
                </div>
              </div>
              <div className="warn-pill">⚠ All certs pending verification</div>
            </div>

            <div className="metrics">
              {[
                { val: deduped.length, lbl: "Total vendors" },
                { val: multiCount, lbl: "Multi-role champions" },
                { val: highCount, lbl: "High profile" },
                { val: "75 mi", lbl: "Radius from San Jose" },
              ].map(m => (
                <div className="met" key={m.lbl}>
                  <div className="mval">{m.val}</div>
                  <div className="mlbl">{m.lbl}</div>
                </div>
              ))}
            </div>

            <div className="tabs">
              {SUBS.map(s => (
                <div key={s} className={"tab" + (tab === s ? " on" : "")} onClick={() => { setTab(s); setFilters([]); setSearch(""); }}>
                  <div className="tab-n">{s}</div>
                  <div className="tab-c">{counts[s]}</div>
                </div>
              ))}
            </div>

            <div className="toolbar">
              <span className="t-lbl">Filter:</span>
              {FILTER_DEFS.map(f => (
                <button key={f.id} className={"chip" + (filters.includes(f.id) ? " on" : "")} onClick={() => togFilter(f.id)}>
                  {filters.includes(f.id) ? "✓ " : ""}{f.label}
                </button>
              ))}
              <div className="srch-wrap">
                <span className="sico">⌕</span>
                <input className="srch" placeholder="Search vendors, processes…" value={search} onChange={e => setSearch(e.target.value)} />
              </div>
            </div>

            <div className="rbar">
              <div className="rinfo">
                Showing <strong>{filtered.length}</strong> of {tabV.length} vendors in <strong>{tab}</strong>
                {filters.length > 0 && <span style={{ color: "var(--red)" }}> · {filters.length} filter{filters.length > 1 ? "s" : ""} active</span>}
              </div>
              <div className="rdesc">{SUB_DESC[tab].toUpperCase()}</div>
            </div>

            {filtered.length === 0 ? (
              <div className="empty">
                <div className="e-ico">○</div>
                <div className="e-t">No vendors match</div>
                <div className="e-s">Try removing a filter or clearing the search.</div>
              </div>
            ) : (
              <div className="grid">
                {filtered.map((v, i) => (
                  <Card key={v.name + tab} v={v} multi={isMulti(v)} delay={i * 18} onClick={() => setSel(v)} />
                ))}
              </div>
            )}

            {sel && (
              <div className="overlay" onClick={e => { if (e.target.className === "overlay") setSel(null); }}>
                <Drawer v={sel} multi={isMulti(sel)} onClose={() => setSel(null)} />
              </div>
            )}
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
